<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="vig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- vinheta vertical -->
  <rect width="1080" height="1920" fill="url(#vig)"/>

  <!-- moldura HUD (cantos) -->
  <g stroke="#8fb35a" stroke-width="5" fill="none" opacity="0.85" filter="url(#glow)">
    <!-- canto sup esq -->
    <path d="M40 140 L40 40 L140 40"/>
    <!-- canto sup dir -->
    <path d="M1040 140 L1040 40 L940 40"/>
    <!-- canto inf esq -->
    <path d="M40 1780 L40 1880 L140 1880"/>
    <!-- canto inf dir -->
    <path d="M1040 1780 L1040 1880 L940 1880"/>
  </g>

  <!-- barra lateral esq (status) -->
  <rect x="52" y="180" width="6" height="1560" fill="#8fb35a" opacity="0.35"/>
  <rect x="52" y="180" width="6" height="780" fill="#8fb35a" opacity="0.9"/>

  <!-- retícula central (mira) -->
  <g stroke="#8fb35a" stroke-width="2" opacity="0.5">
    <line x1="540" y1="900" x2="540" y2="1020"/>
    <line x1="480" y1="960" x2="600" y2="960"/>
    <circle cx="540" cy="960" r="26" fill="none"/>
  </g>

  <!-- NOME TEMSPEST (topo) -->
  <text x="540" y="250" text-anchor="middle" font-family="Teko, Impact, sans-serif" font-size="150" font-weight="700" fill="#e7e4d6" filter="url(#glow)">TEMSPEST</text>
  <text x="540" y="300" text-anchor="middle" font-family="monospace" font-size="34" fill="#8fb35a" letter-spacing="8">GHOST ANGOLANO</text>

  <!-- HUD inferior: barras de stats -->
  <g font-family="monospace" font-size="28" fill="#e7e4d6">
    <text x="80" y="1700">[ STATUS: LIVE ]</text>
    <text x="80" y="1745" fill="#8fb35a">RPM ▮▮▮▯▯</text>
    <text x="80" y="1790" fill="#d99a3e">MORALE ▮▮▮▮▯</text>
  </g>

  <!-- hashtag rodape -->
  <text x="540" y="1835" text-anchor="middle" font-family="monospace" font-size="26" fill="#9a9c8c">#TTEMSPESTT #WarzoneAngola</text>
</svg>
